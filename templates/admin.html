<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ადმინ პანელი</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@400;600;700&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .admin-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1.5rem;
            font-size: 1rem;
        }
        .admin-table th,
        .admin-table td {
            padding: 0.75rem 1rem;
            text-align: left;
            border-bottom: 1px solid rgba(200, 100, 100, 0.2);
        }
        .admin-table th {
            font-weight: 700;
            color: #c1444e;
            background: rgba(255, 200, 200, 0.2);
        }
        .admin-table tr:hover {
            background: rgba(255, 200, 200, 0.1);
        }
        .admin-title {
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="admin-title">პასუხები 📋</h1>
        <p class="sub-text">ანჯელინას პასუხების ისტორია:</p>

        {% if rows %}
        <table class="admin-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>პასუხი</th>
                    <th>დღე</th>
                    <th>თარიღი</th>
                </tr>
            </thead>
            <tbody>
                {% for row in rows %}
                <tr>
                    <td>{{ row.id }}</td>
                    <td>{{ row.answer }}</td>
                    <td>{{ row.day }}</td>
                    <td>{{ row.created_at }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        {% else %}
        <p class="sub-text">ჯერ არ არის პასუხები.</p>
        {% endif %}
    </div>
</body>
</html>

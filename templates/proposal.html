<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>კია მარტო სწორი პასუხი</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@400;600;700&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>ანჟელინა, დამითმობ ერთ საღამოს? </h1>

        <!-- Initial yes/no choice -->
        <div id="choice-area" class="choice-area">
            <button id="yes-btn" class="btn btn-yes">კი</button>
            <button id="no-btn" class="btn btn-no">არ მცალია</button>
        </div>

        <!-- Day picker, hidden until Yes is clicked -->
        <div id="day-step" class="day-form hidden">
            <p class="sub-text">აირჩიე დღე:</p>
            <div class="day-buttons">
                <button type="button" data-day="პარასკევი" class="btn btn-day day-option">პარასკევი</button>
                <button type="button" data-day="შაბათი" class="btn btn-day day-option">შაბათი</button>
            </div>
        </div>

        <!-- Time picker, hidden until a day is chosen -->
        <form id="celebrate-form" action="/celebrate" method="POST" class="time-form hidden">
            <p class="sub-text">და საათი? </p>
            <input type="hidden" name="day" id="selected-day">
            <div class="time-grid">
                <button type="submit" name="time" value="1:00 PM" class="btn btn-time">1 PM</button>
                <button type="submit" name="time" value="2:00 PM" class="btn btn-time">2 PM</button>
                <button type="submit" name="time" value="3:00 PM" class="btn btn-time">3 PM</button>
                <button type="submit" name="time" value="4:00 PM" class="btn btn-time">4 PM</button>
                <button type="submit" name="time" value="5:00 PM" class="btn btn-time">5 PM</button>
                <button type="submit" name="time" value="6:00 PM" class="btn btn-time">6 PM</button>
                <button type="submit" name="time" value="7:00 PM" class="btn btn-time">7 PM</button>
                <button type="submit" name="time" value="8:00 PM" class="btn btn-time">8 PM</button>
                <button type="submit" name="time" value="9:00 PM" class="btn btn-time">9 PM</button>
                <button type="submit" name="time" value="10:00 PM" class="btn btn-time">10 PM</button>
                <button type="submit" name="time" value="11:00 PM" class="btn btn-time">11 PM</button>
            </div>
        </form>
    </div>

    <script>
        const yesBtn = document.getElementById('yes-btn');
        const noBtn = document.getElementById('no-btn');
        const choiceArea = document.getElementById('choice-area');
        const dayStep = document.getElementById('day-step');
        const celebrateForm = document.getElementById('celebrate-form');
        const selectedDayInput = document.getElementById('selected-day');
        const dayOptions = document.querySelectorAll('.day-option');

        let yesScale = 1;
        let noScale = 1;
        let noRunCount = 0;

        // When "No" is hovered, it runs away and "Yes" grows
        noBtn.addEventListener('mouseover', () => {
            handleNoInteraction();
        });

        // Also run away on click (mobile friendly)
        noBtn.addEventListener('click', (e) => {
            e.preventDefault();
            handleNoInteraction();
        });

        function handleNoInteraction() {
            noRunCount++;
            moveNoButton();
            growYesButton();
            shrinkNoButton();
        }

        // Reveal day picker when "Yes" is clicked
        yesBtn.addEventListener('click', () => {
            choiceArea.classList.add('hidden');
            dayStep.classList.remove('hidden');
        });

        // When a day is chosen, reveal the time picker
        dayOptions.forEach(btn => {
            btn.addEventListener('click', () => {
                selectedDayInput.value = btn.dataset.day;
                dayStep.classList.add('hidden');
                celebrateForm.classList.remove('hidden');
            });
        });

        function moveNoButton() {
            // On first move, switch to fixed position at current spot so
            // CSS transition glides smoothly instead of jumping.
            if (noBtn.style.position !== 'fixed') {
                const rect = noBtn.getBoundingClientRect();
                noBtn.style.position = 'fixed';
                noBtn.style.left = rect.left + 'px';
                noBtn.style.top = rect.top + 'px';
                // force reflow so the browser records the starting point
                noBtn.offsetHeight;
            }

            // Pick a new random spot within the viewport
            const padding = 20;
            const maxX = window.innerWidth - noBtn.offsetWidth - padding;
            const maxY = window.innerHeight - noBtn.offsetHeight - padding;
            const randomX = Math.random() * maxX;
            const randomY = Math.random() * maxY;

            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        function growYesButton() {
            yesScale += 0.15;
            yesBtn.style.transform = `scale(${yesScale})`;
        }

        function shrinkNoButton() {
            // Keep the button visible for at least 10 runs, then let it shrink away
            if (noRunCount <= 10) {
                // Slight shrink but stay clearly visible during the first 10 runs
                noScale = Math.max(0.85, noScale - 0.015);
            } else {
                // After 10 runs, shrink more noticeably toward disappearance
                noScale = Math.max(0.1, noScale - 0.1);
                if (noScale <= 0.15) {
                    noBtn.style.display = 'none';
                }
            }
            noBtn.style.transform = `scale(${noScale})`;
        }
    </script>
</body>
</html>
